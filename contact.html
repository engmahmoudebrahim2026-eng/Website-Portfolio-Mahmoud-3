  <section id="Contact" class="contact-section container fade-up">
    <div class="profile-container">
      <img src="محمود 2.jpg" alt="Mahmoud Ebrahem" class="profile-img fade-up">
      <h1 class="title fade-up">👇Think You❗👇</h1>
    </div>
    <form id="contactForm" class="form-container fade-up">

      <div class="form-group fade-up">
        <label for="firstName">First Name</label>
        <input type="text" class="form-control" id="firstName" name="firstName" required
          placeholder="Enter your first name">
        <div class="invalid-feedback"></div>
        <div class="valid-feedback"></div>
      </div>

      <div class="form-group fade-up">
        <label for="lastName">Last Name</label>
        <input type="text" class="form-control" id="lastName" name="lastName" required
          placeholder="Enter your last name">
        <div class="invalid-feedback"></div>
        <div class="valid-feedback"></div>
      </div>

      <div class="form-group fade-up">
        <label for="phone">Phone</label>
        <input type="tel" class="form-control" id="phone" name="phone" required placeholder="Your phone number">
        <div class="invalid-feedback"></div>
        <div class="valid-feedback"></div>
      </div>

      <div class="form-group fade-up">
        <label for="subject">Subject</label>
        <input type="text" class="form-control" id="subject" name="subject" required placeholder="Message subject">
        <div class="invalid-feedback"></div>
        <div class="valid-feedback"></div>
      </div>

      <div class="form-group full">
        <label for="email">Email</label>
        <input type="email" class="form-control" id="email" name="email" required placeholder="your.email@example.com">
        <div class="invalid-feedback"></div>
        <div class="valid-feedback"></div>
      </div>

      <div class="form-group full fade-up">
        <label for="message">Message</label>
        <textarea class="form-control" id="message" name="message" rows="6" required
          placeholder="Write your message here..."></textarea>
        <div class="invalid-feedback"></div>
        <div class="valid-feedback"></div>
      </div>
      <button type="submit" class="submit-btn btn-custom fade-up" id="submitBtn">Submit</button>
      <div id="formMessage" class="form-message fade-up"></div>
    </form>
  </section>
